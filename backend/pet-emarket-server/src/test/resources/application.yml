spring:
  datasource:
    url: jdbc:h2:mem:pet_emarket_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop

pet-emarket:
  jwt:
    secret: "pet-emarket-java-test-secret"
    ttl-seconds: 28800
  ai-service:
    enabled: false
    base-url: http://localhost:8001
    timeout-seconds: 1
  mail:
    enabled: false
