server:
  port: 8080

spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../../.env[.properties]
  application:
    name: pet-emarket-server
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  datasource:
    # 只需要修改下面这行 url
    url: "${DB_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:pet_emarket}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=true&enabledTLSProtocols=TLSv1.2,TLSv1.3&createDatabaseIfNotExist=true}"
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Zhaojerry331!}
  servlet:
    multipart:
      max-file-size: ${UPLOAD_MAX_FILE_SIZE:500MB}
      max-request-size: ${UPLOAD_MAX_REQUEST_SIZE:520MB}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

pet-emarket:
  jwt:
    secret: "pet-emarket-java-dev-secret-change-before-production"
    ttl-seconds: 28800
  cors:
    allowed-origins:
      - "http://localhost:3000"
      - "http://127.0.0.1:3000"
      - "http://localhost:4000"
      - "http://127.0.0.1:4000"
      - "http://localhost:5173"
      - "http://localhost:8080"
      - "http://localhost:5000"
      - "http://localhost:55555"
  ai-service:
    enabled: ${AI_SERVICE_ENABLED:true}
    auto-start: ${AI_SERVICE_AUTO_START:true}
    base-url: ${AI_SERVICE_BASE_URL:http://localhost:8001}
    timeout-seconds: ${AI_SERVICE_TIMEOUT_SECONDS:60}
    startup-timeout-seconds: ${AI_SERVICE_STARTUP_TIMEOUT_SECONDS:25}
  oss:
    enabled: ${OSS_ENABLED:false}
    endpoint: ${ALIYUN_OSS_ENDPOINT:}
    bucket: ${ALIYUN_OSS_BUCKET:}
    access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:}
    public-base-url: ${ALIYUN_OSS_PUBLIC_BASE_URL:}
    object-prefix: ${ALIYUN_OSS_OBJECT_PREFIX:pet-emarket}
  amap:
    api-key: ${AMAP_API_KEY:}
    base-url: ${AMAP_BASE_URL:https://restapi.amap.com}
    timeout-seconds: ${AMAP_TIMEOUT_SECONDS:3}
  mail:
    enabled: ${MAIL_ENABLED:false}
    host: ${SMTP_HOST:smtp.qq.com}
    port: ${SMTP_PORT:465}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    from: ${MAIL_FROM:}
    ssl-enabled: ${SMTP_SSL_ENABLED:true}
    starttls-enabled: ${SMTP_STARTTLS_ENABLED:false}
    dev-code-in-response: ${MAIL_DEV_CODE_IN_RESPONSE:false}

  management:
    endpoint:
      health:
        show-details: always # 总是显示详细信息（包括数据库、磁盘等）
    endpoints:
      web:
        exposure:
          include: 'health' # 确保 health 接口在 web 端可见（默认就是可见的）
