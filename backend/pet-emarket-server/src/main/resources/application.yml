server:
  port: 8080

spring:
  application:
    name: pet-emarket-server
  datasource:
    url: jdbc:h2:mem:pet_emarket;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

pet-emarket:
  jwt:
    secret: "pet-emarket-java-dev-secret-change-before-production"
    ttl-seconds: 28800
  cors:
    allowed-origins:
      - "http://localhost:3000"
      - "http://127.0.0.1:3000"
      - "http://localhost:4000"
      - "http://127.0.0.1:4000"
      - "http://localhost:5173"
      - "http://localhost:8080"
      - "http://localhost:5000"
  ai-service:
    enabled: true
    base-url: "http://localhost:8001"
    timeout-seconds: 10
