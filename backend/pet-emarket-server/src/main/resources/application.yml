server:
  port: 8080

spring:
  application:
    name: pet-emarket-server
  datasource:
    url: jdbc:h2:file:../../../database/data/pet_emarket;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

pet-emarket:
  jwt:
    secret: "pet-emarket-java-dev-secret-change-before-production"
    ttl-seconds: 28800
  cors:
    allowed-origins:
      - "http://localhost:3000"
      - "http://127.0.0.1:3000"
      - "http://localhost:4000"
      - "http://127.0.0.1:4000"
      - "http://localhost:5173"
      - "http://localhost:8080"
      - "http://localhost:5000"
  ai-service:
    enabled: ${AI_SERVICE_ENABLED:true}
    base-url: ${AI_SERVICE_BASE_URL:http://localhost:8001}
    timeout-seconds: ${AI_SERVICE_TIMEOUT_SECONDS:10}
  amap:
    api-key: ${AMAP_API_KEY:}
    base-url: ${AMAP_BASE_URL:https://restapi.amap.com}
    timeout-seconds: ${AMAP_TIMEOUT_SECONDS:3}
  mail:
    enabled: ${MAIL_ENABLED:false}
    host: ${SMTP_HOST:smtp.qq.com}
    port: ${SMTP_PORT:465}
    username: ${SMTP_USERNAME:3449940090@qq.com}
    password: ${SMTP_PASSWORD:}
    from: ${MAIL_FROM:3449940090@qq.com}
    ssl-enabled: ${SMTP_SSL_ENABLED:true}
    starttls-enabled: ${SMTP_STARTTLS_ENABLED:false}
    dev-code-in-response: ${MAIL_DEV_CODE_IN_RESPONSE:false}
